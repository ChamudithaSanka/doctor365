apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-service
  namespace: default
  labels:
    app: patient-service
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: patient-service
  template:
    metadata:
      labels:
        app: patient-service
        version: v1
    spec:
      containers:
      - name: patient-service
        image: patient-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 5002
          protocol: TCP
        env:
        - name: PORT
          value: "5002"
        - name: SERVICE_NAME
          value: patient-service
        - name: NODE_ENV
          value: development
        - name: MONGODB_URI
          valueFrom:
            configMapKeyRef:
              name: patient-config
              key: mongodb-uri
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: jwt-secret
              key: secret
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/patients/health
            port: 5002
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/patients/health
            port: 5002
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2