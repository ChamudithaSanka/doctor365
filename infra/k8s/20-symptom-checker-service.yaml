apiVersion: apps/v1
kind: Deployment
metadata:
  name: symptom-checker-service
  namespace: doctor365
  labels:
    app: symptom-checker-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: symptom-checker-service
  template:
    metadata:
      labels:
        app: symptom-checker-service
    spec:
      containers:
        - name: symptom-checker-service
          image: doctor365/symptom-checker-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5008
          envFrom:
            - configMapRef:
                name: symptom-checker-config
          env:
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: SYMPTOM_CHECKER_MONGODB_URI
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: common-secret
                  key: GROQ_API_KEY
          livenessProbe:
            httpGet:
              path: /health
              port: 5008
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 5008
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: symptom-checker-service
  namespace: doctor365
spec:
  selector:
    app: symptom-checker-service
  ports:
    - name: http
      port: 5008
      targetPort: 5008
  type: ClusterIP