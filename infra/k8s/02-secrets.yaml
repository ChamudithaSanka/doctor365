apiVersion: v1
kind: Secret
metadata:
  name: common-secret
  namespace: doctor365
type: Opaque
stringData:
  JWT_SECRET: change-this-jwt-secret
  INTERNAL_SERVICE_TOKEN: change-this-internal-token
---
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-secret
  namespace: doctor365
type: Opaque
stringData:
  AUTH_MONGODB_URI: mongodb://mongo:27017/auth_db
  PATIENT_MONGODB_URI: mongodb://mongo:27017/patient_db
  DOCTOR_MONGODB_URI: mongodb://mongo:27017/doctor_db
  APPOINTMENT_MONGODB_URI: mongodb://mongo:27017/appointment_db
  TELEMEDICINE_MONGODB_URI: mongodb://mongo:27017/telemedicine_db
  PAYMENT_MONGODB_URI: mongodb://mongo:27017/payment_db
  NOTIFICATION_MONGODB_URI: mongodb://mongo:27017/notification_db
---
apiVersion: v1
kind: Secret
metadata:
  name: telemedicine-secret
  namespace: doctor365
type: Opaque
stringData:
  AGORA_APP_ID: replace-agora-app-id
  AGORA_APP_CERTIFICATE: replace-agora-app-certificate
---
apiVersion: v1
kind: Secret
metadata:
  name: payment-secret
  namespace: doctor365
type: Opaque
stringData:
  PAYHERE_MERCHANT_ID: replace-payhere-merchant-id
  PAYHERE_MERCHANT_SECRET: replace-payhere-merchant-secret
  PAYHERE_RETURN_URL: https://your-domain.example/payment/success
  PAYHERE_CANCEL_URL: https://your-domain.example/payment/cancel
  PAYHERE_NOTIFY_URL: https://your-domain.example/api/payments/payhere/notify
  PAYHERE_CURRENCY: LKR
  PAYHERE_IS_SANDBOX: "true"
  ADMIN_CALLBACK_TOKEN: replace-admin-callback-token
---
apiVersion: v1
kind: Secret
metadata:
  name: notification-secret
  namespace: doctor365
type: Opaque
stringData:
  TWILIO_ACCOUNT_SID: replace-twilio-account-sid
  TWILIO_AUTH_TOKEN: replace-twilio-auth-token
  TWILIO_PHONE_NUMBER: replace-twilio-phone-number
  GMAIL_USER: replace-gmail-user
  GMAIL_APP_PASSWORD: replace-gmail-app-password
  SENDER_EMAIL: no-reply@doctor365.local
