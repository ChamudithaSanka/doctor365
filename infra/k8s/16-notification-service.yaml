apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: doctor365
  labels:
    app: notification-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: doctor365/notification-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5007
          envFrom:
            - configMapRef:
                name: notification-config
          env:
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: NOTIFICATION_MONGODB_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: common-secret
                  key: JWT_SECRET
            - name: INTERNAL_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: common-secret
                  key: INTERNAL_SERVICE_TOKEN
            - name: TWILIO_ACCOUNT_SID
              valueFrom:
                secretKeyRef:
                  name: notification-secret
                  key: TWILIO_ACCOUNT_SID
            - name: TWILIO_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: notification-secret
                  key: TWILIO_AUTH_TOKEN
            - name: TWILIO_PHONE_NUMBER
              valueFrom:
                secretKeyRef:
                  name: notification-secret
                  key: TWILIO_PHONE_NUMBER
            - name: GMAIL_USER
              valueFrom:
                secretKeyRef:
                  name: notification-secret
                  key: GMAIL_USER
            - name: GMAIL_APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: notification-secret
                  key: GMAIL_APP_PASSWORD
            - name: SENDER_EMAIL
              valueFrom:
                secretKeyRef:
                  name: notification-secret
                  key: SENDER_EMAIL
          livenessProbe:
            httpGet:
              path: /health
              port: 5007
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 5007
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: doctor365
spec:
  selector:
    app: notification-service
  ports:
    - name: http
      port: 5007
      targetPort: 5007
  type: ClusterIP
