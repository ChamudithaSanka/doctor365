apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: doctor365-ingress
  namespace: doctor365
spec:
  ingressClassName: nginx
  rules:
    - host: doctor365.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
